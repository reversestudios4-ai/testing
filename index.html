<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HWBC DASHBOARD ADMIN</title>
    <style>
        :root { --primary: #ffffff; --accent: #510C81; --text-dark: #1e3a8a; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #510C81 0%, #1e3a8a 50%, #0f172a 100%); 
            background-attachment: fixed; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white;
        }
        .screen { 
            display: none; padding: 25px; width: 95%; max-width: 500px; 
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); box-sizing: border-box; 
        }
        .active-screen { display: block !important; animation: slideUp 0.4s ease-out; }
        
        h2 { margin: 0 0 10px 0; text-align: center; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
        p { text-align: center; color: rgba(255, 255, 255, 0.8); font-size: 13px; margin-bottom: 20px; }
        .logo { text-align: center; margin-bottom: 20px; } 
        .logo img { max-width: 100px; height: auto; }

        .input-group { margin-bottom: 15px; position: relative; width: 100%; }
        label { display: block; margin-bottom: 5px; font-size: 11px; font-weight: bold; text-transform: uppercase; opacity: 0.9; }
        .input-field { 
            width: 100%; padding: 14px; border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 12px; background: rgba(255, 255, 255, 0.1); color: white; 
            font-size: 15px; box-sizing: border-box; outline: none; 
        }
select.input-field {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 10px center;
    background-size: 20px;
    padding-right: 40px;
}

select.input-field option {
    background: #1e3a8a;
    color: white;
}
        .toggle-pass { position: absolute; right: 15px; top: 32px; cursor: pointer; font-size: 18px; }
        
        .button { width: 100%; padding: 15px; background: var(--primary); color: var(--accent); border: none; border-radius: 12px; font-size: 13px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-secondary { background: transparent; color: white; border: 1px solid white; margin-top: 15px; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .record-card { background: rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .tick { color: #4ade80; font-weight: bold; margin-left: 8px; }

        #spinner-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:9999; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media print { .button, .btn-secondary, .toggle-pass { display: none !important; } body { background: white !important; } .screen { background: white; color: black; border: none; box-shadow: none; width: 100% !important; max-width: 100% !important; display: block !important; } }
    </style>
</head>
<body>

<div id="spinner-overlay"><div class="loader"></div></div>

<!-- 1. ROLE SCREEN -->
<div id="screen-role" class="screen active-screen">
    <div class="logo"><img src="images/logo.png" alt="Logo"></div>
    <h2>HWBC Admin Hub</h2>
    <p>Select leadership designation</p>
    <div class="input-group">
        <label>Designation</label>
        <select id="role-select" class="input-field" onchange="App.toggleRoleFields()">
            <option value="">-- Select Role --</option>
            <option value="NATIONAL">National Leader</option>
            <option value="SECRETARY">Secretary</option>
            <option value="FINANCE">Finance Leader</option>
            <option value="CIRCUIT">Circuit Leader</option>
            <option value="BRANCH">Branch Leader</option>
        </select>
    </div>
    <div id="circuit-select-group" class="input-group" style="display:none;"><label>Circuit</label><select id="reg-circuit-select" class="input-field"></select></div>
    <div id="branch-select-group" class="input-group" style="display:none;"><label>Branch</label><select id="reg-branch-select" class="input-field"></select></div>
    <button class="button" onclick="App.handleRoleSelection()">Register Account</button>
    <button class="button btn-secondary" onclick="App.navigate('screen-login')">Sign In</button>
</div>

<!-- 2. LOGIN SCREEN -->
<div id="screen-login" class="screen">
    <div class="logo"><img src="images/logo.png" alt="Logo"></div>
    <h2>Secure Sign In</h2>
    <div class="input-group">
        <label>Role</label>
        <select id="login-role" class="input-field">
            <option value="NATIONAL">National Leader</option>
            <option value="SECRETARY">Secretary</option>
            <option value="FINANCE">Finance Leader</option>
            <option value="CIRCUIT">Circuit Leader</option>
            <option value="BRANCH">Branch Leader</option>
        </select>
    </div>
    <div class="input-group"><label>Email</label><input id="login-email" class="input-field" placeholder="email@hwbc.com"></div>
    <div class="input-group">
        <label>Password</label>
        <input id="login-password" type="password" class="input-field">
        <span class="toggle-pass" onclick="App.togglePassword('login-password')">👁️</span>
    </div>
    <button class="button" onclick="App.login()">Log In</button>
    <button class="button btn-secondary" onclick="App.navigate('screen-role')">Back</button>
</div>

<!-- 2.5 SIGNUP SCREEN -->
<div id="screen-signup" class="screen">
    <div class="logo"><img src="images/logo.png" alt="Logo"></div>
    <h2>Create Account</h2>
    <p id="signup-subtitle">Complete your registration</p>
    <div class="input-group"><label>Full Name</label><input id="signup-name" class="input-field" placeholder="Your Full Name"></div>
    <div class="input-group"><label>Email</label><input id="signup-email" class="input-field" placeholder="email@hwbc.com"></div>
    <div class="input-group">
        <label>Password</label>
        <input id="signup-password" type="password" class="input-field">
        <span class="toggle-pass" onclick="App.togglePassword('signup-password')">👁️</span>
    </div>
    <div class="input-group">
        <label>Confirm Password</label>
        <input id="signup-confirm" type="password" class="input-field">
        <span class="toggle-pass" onclick="App.togglePassword('signup-confirm')">👁️</span>
    </div>
    <button class="button" onclick="App.signup()">Create Account</button>
    <button class="button btn-secondary" onclick="App.navigate('screen-role')">Back</button>
</div>

<!-- 3. DASHBOARD -->
<div id="screen-dashboard" class="screen">
    <div class="logo"><img src="images/logo.png" alt="Logo"></div>
    <h2 id="dash-title">Dashboard</h2>
    <p id="dash-subtitle"></p>
    <div id="action-grid" class="dashboard-grid"></div>
    <button class="button btn-secondary" onclick="App.logout()">Logout</button>
</div>

<!-- 4. MEMBER REGISTRATION -->
<div id="screen-member-register" class="screen">
    <div class="logo"><img src="images/logo.png" alt="Logo"></div>
    <h2>New Member</h2>
    <div class="input-group"><label>First Name</label><input id="m-fname" class="input-field"></div>
    <div class="input-group"><label>Last Name</label><input id="m-lname" class="input-field"></div>
    <div class="input-group"><label>Phone</label><input id="m-phone" class="input-field"></div>
    <div class="input-group"><label>Physical Address</label><input id="m-address" class="input-field"></div>
    <div class="input-group"><label>Member Photo</label><input type="file" id="m-photo" class="input-field" accept="image/*"></div>
    <button class="button" onclick="App.submitMemberRegistration()">Register Member</button>
    <button class="button btn-secondary" onclick="App.navigate('screen-dashboard')">Cancel</button>
</div>

<!-- 5. WEEKLY FINANCE -->
<div id="screen-branch-finance" class="screen">
    <div class="logo"><img src="images/logo.png" alt="Logo"></div>
    <h2>Branch Offering</h2>
    <div class="input-group"><label>Month</label><input type="month" id="f-month" class="input-field"></div>
    <div class="input-group"><label>Sunday Week</label><select id="f-week" class="input-field"><option value="1">Week 1</option><option value="2">Week 2</option><option value="3">Week 3</option><option value="4">Week 4</option></select></div>
    <div class="input-group"><label>Amount (ZAR)</label><input type="number" id="f-amount" class="input-field"></div>
    <button class="button" onclick="App.submitWeeklyFinance()">Record Offering</button>
    <button class="button btn-secondary" onclick="App.navigate('screen-dashboard')">Back</button>
</div>

<!-- 6. LIST & AUDIT VIEW -->
<div id="screen-list" class="screen">
    <div class="logo"><img src="images/logo.png" alt="Logo"></div>
    <h2 id="list-title">Records</h2>
    <div id="list-container" style="max-height: 400px; overflow-y: auto;"></div>
    <button class="button" onclick="window.print()">Download PDF Report</button>
    <button class="button btn-secondary" onclick="App.navigate('screen-dashboard')">Done</button>
</div>

<!-- 7. CONTENT HUB -->
<div id="screen-content-hub" class="screen">
    <div class="logo"><img src="images/logo.png" alt="Logo"></div>
    <h2>Content Manager</h2>
    <div class="dashboard-grid">
        <button class="button" onclick="App.openForm('SERMON')">Sermons</button>
        <button class="button" onclick="App.openForm('MUSIC')">Music</button>
        <button class="button" onclick="App.openForm('GALLERY')">Gallery</button>
        <button class="button" onclick="App.openForm('EVENT')">Events</button>
        <button class="button" onclick="App.openForm('BURSARY')">Bursaries</button>
        <button class="button" onclick="App.openForm('YOUTH')">Youth</button>
    </div>
    <button class="button btn-secondary" onclick="App.navigate('screen-dashboard')">Back</button>
</div>

<!-- 8. CONTENT FORM -->
<div id="screen-form" class="screen">
    <div class="logo"><img src="images/logo.png" alt="Logo"></div>
    <h2 id="form-title">Publish</h2>
    <div id="form-fields"></div>
    <button class="button" onclick="App.submitContent()">Upload & Publish</button>
    <button class="button btn-secondary" onclick="App.navigate('screen-content-hub')">Cancel</button>
</div>

<!-- 9. DRILLDOWN -->
<div id="screen-drilldown" class="screen">
    <div class="logo"><img src="images/logo.png" alt="Logo"></div>
    <h2 id="drill-title">Location Selection</h2>
    <div id="drill-container" class="dashboard-grid"></div>
    <button class="button btn-secondary" onclick="App.navigate('screen-dashboard')">Back</button>
</div>

<script>
const API_BASE = "https://byc6aq06e6.execute-api.us-east-1.amazonaws.com/prod";
const CIRCUITS = {
    "Gauteng Circuit": ["Daveyton","Tsakane","Soshanguve","Soweto","Vosloorus"],
    "Highveld Circuit": ["Badplaas","Breyton","Ermelo","Machododorp","Nhlazatshe","Secunda","Witbank"],
    "Lowveld Circuit": ["Barberton","Ka-Mhlutshwa","Matsulu","Mshadza","Ndlunkulu"],
    "Eswatini Circuit": ["Matsapha","Siteki"]
};

const App = {
    currentMode: '', // 'MEMBERS', 'FINANCE', 'APOLOGY'

    init() {
        const cSel = document.getElementById('reg-circuit-select');
        const bSel = document.getElementById('reg-branch-select');
        Object.keys(CIRCUITS).forEach(c => cSel.add(new Option(c, c)));
        Object.values(CIRCUITS).flat().forEach(b => bSel.add(new Option(b, b)));
        
        // SECURITY GATE: Force Login
        if (!localStorage.getItem("role")) {
            this.navigate('screen-role');
        } else {
            this.setupDashboard();
            this.navigate('screen-dashboard');
        }
    },

    navigate(id) {
        // Strict Guard: No access to dashboard screens without role
        const publicScreens = ['screen-role', 'screen-login'];
        if (!localStorage.getItem("role") && !publicScreens.includes(id)) {
            id = 'screen-role';
        }
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    },

    togglePassword(id) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
    },

    toggleRoleFields() {
        const role = document.getElementById('role-select').value;
        document.getElementById('circuit-select-group').style.display = (role === 'CIRCUIT') ? 'block' : 'none';
        document.getElementById('branch-select-group').style.display = (role === 'BRANCH') ? 'block' : 'none';
    },

handleRoleSelection() {
    const role = document.getElementById('role-select').value;
    
    if (!role) {
        alert("Please select a role");
        return;
    }
    
    // Store the selected role temporarily
    sessionStorage.setItem("signup-role", role);
    
    if (role === 'BRANCH') {
        const branch = document.getElementById('reg-branch-select').value;
        if (!branch) {
            alert("Please select a branch");
            return;
        }
        sessionStorage.setItem("signup-branch", branch);
    } else if (role === 'CIRCUIT') {
        const circuit = document.getElementById('reg-circuit-select').value;
        if (!circuit) {
            alert("Please select a circuit");
            return;
        }
        sessionStorage.setItem("signup-circuit", circuit);
    }
    
    // Update signup subtitle to show role
    document.getElementById('signup-subtitle').innerText = `Register as: ${role}`;
    
    // Navigate to signup
    this.navigate('screen-signup');
},


    login() {
        const role = document.getElementById('login-role').value;
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-password').value;

        if(!email || !pass) return alert("Credentials required");

        localStorage.setItem("role", role);
        localStorage.setItem("location", role === 'BRANCH' ? "Tsakane" : "National HQ");
        this.setupDashboard();
        this.navigate('screen-dashboard');
    },

    setupDashboard() {
        const role = localStorage.getItem("role");
        const loc = localStorage.getItem("location");
        const grid = document.getElementById("action-grid");
        grid.innerHTML = "";
        document.getElementById('dash-title').innerText = role + " HUB";
        document.getElementById('dash-subtitle').innerText = "Assigned to: " + loc;

        if (['NATIONAL', 'SECRETARY', 'FINANCE'].includes(role)) {
            this.addBtn("Content Management", () => this.navigate('screen-content-hub'), grid);
            this.addBtn("View Members", () => this.drillCircuits('MEMBERS'), grid);
            this.addBtn("Apology Audit", () => this.drillCircuits('APOLOGY'), grid);
            this.addBtn("Financial Audit", () => this.drillCircuits('FINANCE'), grid);
        } else if (role === 'BRANCH') {
            this.addBtn("Register Member", () => this.navigate('screen-member-register'), grid);
            this.addBtn("Branch Members", () => this.loadRecords(loc, 'MEMBERS'), grid);
            this.addBtn("Update Finance", () => this.navigate('screen-branch-finance'), grid);
        } else if (role === 'CIRCUIT') {
            this.addBtn("View Branches", () => this.drillBranches(loc, 'MEMBERS'), grid);
            this.addBtn("Circuit Financials", () => this.drillBranches(loc, 'FINANCE'), grid);
        }
    },

    addBtn(text, action, container) {
        const btn = document.createElement("button");
        btn.className = "button"; btn.innerText = text; btn.onclick = action;
        container.appendChild(btn);
    },

    // --- DRILLDOWN LOGIC ---
    drillCircuits(mode) {
        this.currentMode = mode;
        const container = document.getElementById("drill-container");
        document.getElementById("drill-title").innerText = "Select Circuit";
        container.innerHTML = "";
        Object.keys(CIRCUITS).forEach(c => {
            this.addBtn(c, () => this.drillBranches(c, mode), container);
        });
        this.navigate('screen-drilldown');
    },

    drillBranches(circuit, mode) {
        const container = document.getElementById("drill-container");
        document.getElementById("drill-title").innerText = circuit + " Branches";
        container.innerHTML = "";
        CIRCUITS[circuit].forEach(b => {
            this.addBtn(b, () => this.loadRecords(b, mode), container);
        });
        this.navigate('screen-drilldown');
    },

    // --- DATA LOADING (MEMBERS / FINANCE / APOLOGY) ---
    async loadRecords(branch, mode) {
        this.navigate('screen-list');
        const container = document.getElementById('list-container');
        document.getElementById('list-title').innerText = `${branch} - ${mode}`;
        container.innerHTML = "Fetching...";

        let endpoint = (mode === 'FINANCE') ? `${API_BASE}/get_finance_report` : `${API_BASE}/retrieve_branch_member`;
        if (mode === 'APOLOGY') endpoint = `${API_BASE}/view_apologies?date=2024-01-01`; // Sample

        try {
            const res = await fetch(`${endpoint}?branch=${encodeURIComponent(branch)}`);
            const data = await res.json();
            container.innerHTML = "";

            if (mode === 'MEMBERS') {
                data.members.forEach(m => {
                    const card = document.createElement("div");
                    card.className = "record-card";
                    card.innerHTML = `
                        <b>${m.firstName} ${m.lastName}</b> 
                        ${m.isVerified ? '<span class="tick">✔ Verified</span>' : ''}
                        <br><small>${m.phone}</small>
                        ${(!m.isVerified && localStorage.getItem("role") === 'BRANCH') ? 
                        `<button class="button" style="width:auto; margin-top:5px;" onclick="App.verifyMember('${m.phone}','${branch}')">Verify</button>` : ''}
                    `;
                    container.appendChild(card);
                });
            } else if (mode === 'FINANCE') {
                data.forEach(f => {
                    const card = document.createElement("div");
                    card.className = "record-card";
                    card.innerHTML = `<b>${f.monthYear}</b><br>Total: R${f.totalOffering}<br><small>W1: ${f.week1} | W2: ${f.week2} | W3: ${f.week3} | W4: ${f.week4}</small>`;
                    container.appendChild(card);
                });
            }
        } catch(e) { container.innerHTML = "No records found."; }
    },

    // --- BRANCH ACTIONS ---
    async submitMemberRegistration() {
        alert("Uploading Photo & Enrolling Member...");
        this.navigate('screen-dashboard');
    },

    async submitWeeklyFinance() {
        const branch = localStorage.getItem("location");
        const month = document.getElementById('f-month').value;
        const week = document.getElementById('f-week').value;
        const amount = document.getElementById('f-amount').value;

        document.getElementById("spinner-overlay").style.display="flex";
        try {
            await fetch(`${API_BASE}/update_finance`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ branchName: branch, monthYear: month, weekNumber: week, amount: amount })
            });
            alert("Offering Recorded!");
            this.navigate('screen-dashboard');
        } catch(e) { alert("Save failed"); }
        document.getElementById("spinner-overlay").style.display="none";
    },

    async verifyMember(phone, branch) {
        alert("Member " + phone + " Verified!");
        this.loadRecords(branch, 'MEMBERS');
    },

    // --- CONTENT UPLOAD ---
    openForm(type) {
        const container = document.getElementById('form-fields');
        document.getElementById('form-title').innerText = "Upload " + type;
        container.innerHTML = `
            <div class="input-group"><label>Title</label><input id="f-title" class="input-field"></div>
            <div class="input-group"><label>${type === 'SERMON' ? 'Preacher' : 'Artist'}</label><input id="f-desc" class="input-field"></div>
            <div class="input-group"><label>Select File</label><input type="file" id="f-media" class="input-field"></div>
            <div class="input-group"><label>Thumbnail/Poster</label><input type="file" id="f-thumb" class="input-field"></div>
        `;
        this.navigate('screen-form');
    },

    async submitContent() {
        alert("File Uploading to S3...");
        this.navigate('screen-dashboard');
    },

    logout() { localStorage.clear(); location.reload(); }
};

window.onload = () => App.init();
</script>
</body>
</html>
